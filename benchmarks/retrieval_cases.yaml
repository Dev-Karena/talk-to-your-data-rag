# Retrieval benchmark dataset — Sprint 4 (Option A: real textbook corpus).
#
# Ground truth is keyed on doc_hash (collision-proof); expected_sources are for
# human-readable reports only. The corpus fingerprint pins this dataset to the
# exact indexed corpus produced by scripts/build_benchmark_corpus.py.
#
# Case types:
#   single         - answer lives in exactly one textbook
#   cross_document - question genuinely spans two textbooks (coverage tested)
#   negative       - not covered by any textbook (no abstention threshold exists,
#                    so these report the top similarity score for inspection)

corpus:
  description: "Real ML / OS / DBMS textbooks (Option A canonical corpus)"
  expected_doc_hashes:
    - "defd579186e4502ac8213d4e1cb12e8341ecb4a19128796120ec1f1ccf69516f"  # ML.pdf   (120p, 379 chunks)
    - "d466b1706c4ebfff7d3070882562a0d458b4be06b5202aed3108b6b8e49eb0c8"  # OS.pdf   (133p, 289 chunks)
    - "112115c810a1f47f517033e8d80d1c3d64e645a5ea384215f1f9414f78e85dd8"  # DBMS.pdf (232p, 463 chunks)

